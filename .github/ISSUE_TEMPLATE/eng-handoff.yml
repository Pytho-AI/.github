name: "Engineering Handoff / Technical Decision"
description: "Hand off a technical problem with options and a recommendation for an engineer to pick up."
title: "[Handoff] "
labels: ["eng-handoff", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## When to use this template

        Use this when there's a technical problem that's **blocked or stalled**, you've **investigated the options**, and you need an engineer to **pick it up and execute**.

        This is **not** for:
        - Proposing a brand-new product feature → use "Feature Request" (follows `/spec`)
        - Filing a bug → use "Bug Report"
        - Asking an open-ended research question → use "Research"

        The goal of this template is to let the next engineer **start working within 5 minutes** of opening the issue — no slack archaeology, no private DMs, no "wait let me check." Every fact they need is in here.

        > **Heuristic**: if someone skims this issue cold, they should be able to tell you (a) what's broken, (b) what the options are, (c) which one you recommend, and (d) how they'll know they're done.

  - type: textarea
    id: problem
    attributes:
      label: "Problem"
      description: "Lead with the symptom, then the root cause. Include **concrete numbers** from failure modes (latency, error rates, cost, duration). Name what you've already ruled out — future-you will thank present-you."
      placeholder: |
        [1–3 short paragraphs.]

        **Symptom**: [What the user / operator sees going wrong]
        **Root cause** (if known): [The actual broken thing — not the first symptom]
        **What's already been tried and didn't work**: [Briefly list — saves the next engineer 2 hours]
        **Why we need to solve it now**: [Customer impact, deadline, blocking downstream work, etc.]
    validations:
      required: true

  - type: textarea
    id: current-state
    attributes:
      label: "Current State"
      description: "All the system-state facts the next engineer needs. Use `<details>` blocks for long sections so the issue stays scannable. **Do not inline secrets** — reference where they live (k8s secret name, SSM path, SOPS file)."
      value: |
        <details>
        <summary><b>Infrastructure / data inventory</b></summary>

        <!-- S3 buckets, databases, queues, external services. Include account IDs, regions, sizes. -->
        | Resource | Details | Size / Count |
        |---|---|---:|
        | | | |

        </details>

        <details>
        <summary><b>Downstream system state</b> (where this feeds into)</summary>

        <!-- ES index, DynamoDB table, Kafka topic, etc. Include current data state: how much is done, how much is left. -->

        </details>

        <details>
        <summary><b>Existing code / artifacts</b></summary>

        <!-- Scripts, services, repos, branches that already exist. Include file paths + what they do. -->
        - Path: ``
        - Path: ``

        </details>

        <details>
        <summary><b>Credentials &amp; access</b></summary>

        <!-- k8s secret name, SSM path, SOPS file, IAM role. NEVER inline the secret value. -->

        </details>
    validations:
      required: true

  - type: textarea
    id: options-matrix
    attributes:
      label: "Options — TL;DR matrix"
      description: "Side-by-side comparison of the realistic options. Keep it to ≤5 columns and ≤5 rows so it fits on one screen. Include at least: setup effort, cost, reliability, any migration burden."
      value: |
        | Option | Setup effort | Cloud cost | Migration burden | Reliability | Recurring cost |
        |---|---|---|---|---|---|
        | **A. Ship minimum / defer work** | 0 days | $0 | none | n/a | $0 |
        | **B. [Option name]** | | | | | |
        | **C. [Option name]** | | | | | |
        | **D. [Option name]** | | | | | |
    validations:
      required: true

  - type: textarea
    id: option-details
    attributes:
      label: "Option details"
      description: "For each non-trivial option, 3–6 lines covering: what it does, pros, cons, concrete cost estimate with assumptions, when this is the right call. One `###` heading per option."
      value: |
        ### A. Ship minimum / defer work

        [What it actually means for this specific problem. Who loses and who doesn't.]

        - **Pro**: ships today, $0
        - **Con**: [specific thing that stays broken]
        - **When this is right**: [concrete conditions — e.g. "if the demo audience doesn't care about X"]

        ### B. [Option name]

        [1–2 sentence description of the approach.]

        - [Bullets with concrete numbers. If you're doing throughput math, show the assumptions — "X chunks/sec × Y items = Z seconds".]
        - **Cost**: [cloud $ + engineer-days + recurring]
        - **Pro**: ...
        - **Con**: ...

        ### C. [Option name]

        ...

        ### D. [Option name]

        ...
    validations:
      required: true

  - type: textarea
    id: recommendation
    attributes:
      label: "Recommendation"
      description: "Which option do you recommend, and why? If the recommendation has prerequisites or a fallback, say so explicitly. This is where you earn your keep — don't punt."
      placeholder: |
        1. **Do X immediately** — [reason: unblocks users today, low risk]
        2. **Pursue Y as the long-term answer** — [reason: best economics / reliability / fit]
        3. **Fall back to Z** if Y isn't production-ready within [timeframe] or if [condition]
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance Criteria"
      description: "Concrete, observable checks. The engineer should be able to tick every box before marking this done. Avoid vague ones like 'works well' — prefer 'processes 1000 req/s with p99 < 200ms'."
      value: |
        - [ ] [Specific, observable behavior — with numbers where applicable]
        - [ ] [Happy-path end-to-end test named + passing]
        - [ ] [Failure mode explicitly handled — describe how to verify]
        - [ ] [Observability: log / metric / dashboard that proves it's working in prod]
        - [ ] [Relevant skill / rule / doc updated with what we learned]
    validations:
      required: true

  - type: textarea
    id: non-goals
    attributes:
      label: "Non-Goals"
      description: "What's explicitly **not** in scope for this issue. Protects against scope creep and sets the next person up to say no cleanly."
      value: |
        - We are **not** [thing out of scope] — that's a separate issue / later phase
        - We are **not** [another thing]
        - We are **not** [third thing]
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: "Urgency"
      description: "How soon does this need to land?"
      options:
        - "P0 — blocking production / customer today"
        - "P1 — blocking a commitment this sprint"
        - "P2 — should land in the next 1–2 sprints"
        - "P3 — nice to have, no deadline"
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: "References"
      description: "Links, paths, and prior art. Other issues/PRs/docs the next engineer will want open in tabs."
      placeholder: |
        - Related issue: Pytho-AI/repo#N
        - Prior RCA or learnings: `internal-tools/pytho-sdlc-engine/skills/.../SKILL.md`
        - External docs: [vendor pricing page], [API reference]
        - Companion work: `repo@branch-name`
