name: "Feature Request"
description: "Propose a new feature or enhancement."
title: "[Feature] "
labels: ["feature", "needs-spec"]
body:
  - type: input
    id: mission-owner
    attributes:
      label: "Mission Owner"
      description: "Who owns this feature end-to-end?"
      placeholder: "e.g. Jane Doe"
    validations:
      required: true

  - type: checkboxes
    id: product
    attributes:
      label: "Product / Domain"
      description: "Which product(s) does this feature touch? Select all that apply."
      options:
        - label: "Atlas — geospatial, maps, terrain, symbology"
        - label: "Anvil — planning workflows (MDMP, TLP, MCPP, JOPP, ICS, ADM, RDSP)"
        - label: "Crucible — wargaming, COA generation, scenario engine"
        - label: "Tome — doctrine, RAG, knowledge base, vector search"
        - label: "Other — platform, auth, infra, cross-cutting"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem Statement"
      description: "What is broken or missing? Be specific. Bad: 'Users want X'. Good: 'Battalion S-3 needs to brief COAs in 5 min; currently takes 30 min because...'"
      placeholder: |
        **Who has it:** [role + context, e.g. "S-3 during exercise planning, under time pressure"]
        **What breaks today:** [specific pain, with any data you have]
        **Impact if unbuilt:** [what happens if we ship nothing]
    validations:
      required: true

  - type: textarea
    id: user-stories
    attributes:
      label: "User Stories (Given / When / Then)"
      description: "Write at least the primary happy-path story plus one edge case."
      placeholder: |
        **Story 1: [action]**
        As a: [role]
        I want to: [action]
        So that: [outcome]

        Given: [precondition]
        When: [action]
        Then: [expected result]
          AND: [additional assertion]

        Edge case: [scenario]
        Given: ...
        When: ...
        Then: ...

        Acceptance Criteria:
        - [ ] p99 latency < Xs
        - [ ] Error message shown if [condition]
        - [ ] Keyboard navigable (WCAG AA)
    validations:
      required: true

  - type: textarea
    id: success-metrics
    attributes:
      label: "Success Metrics"
      placeholder: |
        **Leading (operational — measures effort/quality):**
        - Adoption: % of users using feature within 30 days
        - Quality: [specific quality signal]
        - Performance: p50/p99 latency target

        **Lagging (business — measures outcome):**
        - [Time saved / efficiency gained]
        - [User satisfaction / NPS impact]
    validations:
      required: true

  - type: textarea
    id: doctrine
    attributes:
      label: "MDMP / Doctrine Alignment (if applicable)"
      description: "Which MDMP steps does this affect? Any doctrine references (FM, JP, MCDP)?"
      placeholder: |
        **MDMP Steps affected:** Step 3 (Mission Analysis), Step 4 (COA Development)
        **Doctrine references:** FM 3-0 §X, JP 5-0 §Y
      value: "N/A"
